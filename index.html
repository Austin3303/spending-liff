<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spending Logger</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8f135;
      --accent2: #f1c835;
      --text: #f0f0f0;
      --muted: #888;
      --input-bg: #222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .header {
      width: 100%;
      max-width: 420px;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .field input[type="number"] {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }

    .amount-wrap {
      position: relative;
    }

    .amount-wrap .currency {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 13px;
      font-family: 'DM Mono', monospace;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .cat-btn {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 10px 6px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .cat-btn .icon { display: block; font-size: 18px; margin-bottom: 3px; }

    .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
      font-weight: 600;
    }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #0f0f0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .submit-btn:active { transform: scale(0.98); opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0f0f0f;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 100px;
      transition: transform 0.3s ease;
      z-index: 999;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <h1>Log <span>Spending</span></h1>
  <p>Track your daily expenses easily</p>
</div>

<div class="card">
  <!-- Date -->
  <div class="field">
    <label>Date</label>
    <input type="date" id="date" />
  </div>

  <!-- Amount -->
  <div class="field">
    <label>Amount</label>
    <div class="amount-wrap">
      <input type="number" id="amount" placeholder="0" min="0" />
      <span class="currency">THB</span>
    </div>
  </div>

  <!-- Item -->
  <div class="field">
    <label>Item</label>
    <input type="text" id="item" placeholder="e.g. Lunch, BTS, Coffee" />
  </div>

  <!-- Category -->
  <div class="field">
    <label>Category</label>
    <div class="categories">
      <button class="cat-btn" data-cat="Food" onclick="selectCat(this)">
        <span class="icon">🍜</span>Food
      </button>
      <button class="cat-btn" data-cat="Transport" onclick="selectCat(this)">
        <span class="icon">🚇</span>Transport
      </button>
      <button class="cat-btn" data-cat="Shopping" onclick="selectCat(this)">
        <span class="icon">🛍️</span>Shopping
      </button>
      <button class="cat-btn" data-cat="Health" onclick="selectCat(this)">
        <span class="icon">💊</span>Health
      </button>
      <button class="cat-btn" data-cat="Entertainment" onclick="selectCat(this)">
        <span class="icon">🎬</span>Fun
      </button>
      <button class="cat-btn" data-cat="Other" onclick="selectCat(this)">
        <span class="icon">📦</span>Other
      </button>
    </div>
  </div>

  <button class="submit-btn" onclick="submitExpense()">+ Log Expense</button>
</div>

<div class="toast" id="toast">✅ Logged!</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSStj3k5JLsHmQvKTKpS1upXBdNiHXpwXm6ugNnHpdbTqdUR51H2Om1xbL_Eo2UUFWpA/exec";
  const LIFF_ID = "2009679263-4JGlOXcy";

  let selectedCategory = "";

  // Set today's date
  document.getElementById("date").value = new Date().toISOString().split("T")[0];

  // Init LIFF
  liff.init({ liffId: LIFF_ID }).catch(err => console.warn("LIFF init error", err));

  function selectCat(btn) {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedCategory = btn.dataset.cat;
  }

  async function submitExpense() {
    const dateVal = document.getElementById("date").value;
    const amount = document.getElementById("amount").value;
    const item = document.getElementById("item").value.trim();

    if (!dateVal || !amount || !item || !selectedCategory) {
      alert("Please fill in all fields and select a category.");
      return;
    }

    const d = new Date(dateVal);
    const day = d.getDate();
    const month = d.getMonth() + 1;
    const year = d.getFullYear();

    const btn = document.querySelector(".submit-btn");
    btn.disabled = true;
    btn.textContent = "Logging...";

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ day, month, year, item, amount: parseFloat(amount), category: selectedCategory, source: "liff" })
      });

      showToast("✅ Logged!");
      document.getElementById("amount").value = "";
      document.getElementById("item").value = "";
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      selectedCategory = "";
    } catch (e) {
      alert("Error logging expense. Try again.");
    }

    btn.disabled = false;
    btn.textContent = "+ Log Expense";
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }
</script>
</body>
</html>
